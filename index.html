<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰文輸入練習 - 第一課：首列 (Home Row)</title>
    <meta name="description" content="泰文 Kedmanee 鍵盤首列輸入練習，提供高質感與現代化互動設計的打字學習體驗。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入英文字型（介面）與泰文字型（網頁字體） -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <main class="container glass-panel">
        <header>
            <h1>泰文輸入練習</h1>
            <h2 id="lesson-subtitle">Kedmanee 鍵盤自由練習</h2>
            <p id="lesson-desc">從 1000 個常用泰文單字中隨機出題，請按對應的 Kedmanee 按鍵輸入。</p>
            <div style="margin-top:0.5rem;">
                <select id="lesson-select">
                    <option value="1" selected>一、44個泰文子音</option>
                    <option value="2">二、泰文母音鍵位練習</option>
                    <option value="3">三、子音+母音</option>
                    <option value="4">四、子音+母音+聲調</option>
                    <option value="5">五、常用單字（10字/輪）</option>
                </select>
            </div>
        </header>

        <section class="stats-board">
            <div class="stat-card">
                <span class="stat-title" id="stat-remaining-label">剩餘</span>
                <span class="stat-value" id="stat-wpm">900</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">正確率</span>
                <span class="stat-value" id="stat-accuracy">100%</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">錯誤</span>
                <span class="stat-value" id="stat-errors">0</span>
            </div>
        </section>

        <section class="typing-section">
            <div id="round-progress-bar" class="round-progress-bar">
                <span id="round-progress">第 1 / 100 個</span>
            </div>
            <div id="text-display" class="text-display">
            </div>
            <div id="translation-display" class="translation-display"></div>
            <input type="text" id="hidden-input" class="hidden-input" autocomplete="off" spellcheck="false" autofocus>
        </section>

        <!-- 虛擬按鍵對應區域（完整鍵盤將由 app.js 動態產生） -->
        <section class="keyboard-visualizer" id="keyboard">
        </section>

        <div class="controls">
            <button id="reset-btn" class="btn btn-primary">重新開始</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
